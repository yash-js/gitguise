name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json
        run: node -e "const p=require('./package.json'); if(!p.version) throw new Error('missing version')"

      - name: Verify main entry exists
        run: test -f main.js && test -f preload.js

      - name: Verify renderer assets
        run: test -f src/index.html && test -f src/assets/logo.svg

  validate-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify landing page files
        run: |
          test -f web/index.html
          test -f web/styles.css
          test -f web/script.js
          test -f web/public/logo.svg
