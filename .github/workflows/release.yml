name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      app--release_created: ${{ steps.release.outputs['app--release_created'] }}
      app--tag_name: ${{ steps.release.outputs['app--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Prefer a PAT if Actions is not allowed to open PRs with GITHUB_TOKEN.
          # Create a classic PAT with `repo` scope (or fine-grained: Contents + Pull requests write)
          # and store it as RELEASE_PLEASE_TOKEN.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  post-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.app--release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Release published
        run: |
          echo "Released ${{ needs.release-please.outputs.app--tag_name }}"
          echo "Build workflow will run automatically from the new tag."
